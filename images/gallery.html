<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; font-family:sans-serif; padding:24px; }
h2 { color:white; text-align:center; margin-bottom:24px; font-size:18px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; max-width:960px; margin:0 auto; }
.card { background:#2a2a2a; border-radius:10px; overflow:hidden; padding-bottom:8px; }
.card img { width:100%; display:block; }
.card div { color:#ddd; font-size:12px; margin-top:6px; text-align:center; }
</style>
</head><body>

</body></html>
